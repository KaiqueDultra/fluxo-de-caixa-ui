<div class="relative min-h-screen">

  <div class="relative z-10 p-6 max-w-6xl mx-auto space-y-10">

    <div class="text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-blue-900">
        Nossa Equipe
      </h1>
      <p class="text-gray-700 mt-2">
        Conheça as pessoas por trás do projeto
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      @for (pessoa of integrantes; track pessoa.nome) {

        <div
          class="bg-white/70 backdrop-blur-xl border border-white/30 rounded-2xl p-6 shadow-lg text-center hover:scale-105 hover:shadow-2xl transition duration-300"
        >

          <img
            [src]="pessoa.foto"
            [alt]="pessoa.nome"
            class="w-24 h-24 mx-auto rounded-full object-cover shadow-md border-4 border-white"
          />

          <h3 class="mt-4 font-bold text-blue-900 text-lg">
            {{ pessoa.nome }}
          </h3>

          <p class="text-gray-600 text-sm mt-2">
            {{ pessoa.descricao }}
          </p>

        </div>

      }

    </div>

  </div>

</div>
